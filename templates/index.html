<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Multi-Sync // 多视角视频同步抽帧</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
	<script>
		tailwind.config = {
		    theme: {
		        extend: {
		            fontFamily: {
		                sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
		                mono: ['JetBrains Mono', 'SF Mono', 'monospace'],
		            },
		            colors: {
		                pro: {
		                    bg: '#0a0a0a',
		                    surface: '#141414',
		                    surfaceHover: '#1a1a1a',
		                    border: 'rgba(255,255,255,0.06)',
		                    borderStrong: 'rgba(255,255,255,0.12)',
		                    accent: '#5a7a96',
		                    accentHover: '#6d8fab',
		                    accentMuted: 'rgba(90,122,150,0.15)',
		                    text: '#e1e1e1',
		                    textSecondary: '#8a8a8a',
		                    textTertiary: '#555555',
		                    success: '#5a8c6f',
		                    alert: '#8c5a5a',
		                    warning: '#8c7a5a',
		                }
		            }
		        }
		    }
		}
	</script>
	<style>
		body { background-color: #0a0a0a; color: #e1e1e1; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
		.pro-bg { background-image: radial-gradient(circle at 50% 0%, rgba(90,122,150,0.03) 0%, transparent 60%); }
		.pro-panel { background: #141414; border: 1px solid rgba(255,255,255,0.06); transition: border-color 0.2s ease, background-color 0.2s ease; }
		.pro-panel:hover { border-color: rgba(255,255,255,0.09); }
		.pro-input { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.08); color: #e1e1e1; font-family: 'JetBrains Mono', monospace; font-weight: 400; transition: all 0.2s ease; }
		.pro-input:hover { border-color: rgba(255,255,255,0.14); }
		.pro-input:focus { outline: none; border-color: #5a7a96; background: #111111; }
		.btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #e1e1e1; transition: all 0.2s ease; font-weight: 450; }
		.btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18); }
		.btn-ghost:active:not(:disabled) { transform: scale(0.98); }
		.btn-accent { background: rgba(90,122,150,0.12); border: 1px solid rgba(90,122,150,0.25); color: #8aaac6; transition: all 0.2s ease; font-weight: 500; }
		.btn-accent:hover:not(:disabled) { background: rgba(90,122,150,0.18); border-color: rgba(90,122,150,0.4); color: #a0bdd6; }
		.btn-action { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); color: #e1e1e1; transition: all 0.2s ease; font-weight: 500; }
		.btn-action:hover:not(:disabled) { background: #222222; border-color: rgba(255,255,255,0.15); }
		.progress-track { background: #0f0f0f; border-radius: 2px; overflow: hidden; }
		.progress-fill { background: #5a7a96; border-radius: 2px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
		::-webkit-scrollbar { width: 5px; }
		::-webkit-scrollbar-track { background: transparent; }
		::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
		::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
		input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { opacity: 0.3; }
		.divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }
		.video-placeholder { background: #0f0f0f; border: 1px dashed rgba(255,255,255,0.06); cursor: crosshair; }
		.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: background 0.3s ease; }
		.status-dot.active { background: #5a8c6f; }
		.status-dot.idle { background: #333; }
        .grab { cursor: grab; }
        .grabbing { cursor: grabbing !important; }
	</style>
</head>
<body class="min-h-screen pro-bg selection:bg-white/10 selection:text-white">

				<span class="text-[10px] font-mono text-white/30 uppercase tracking-widest">进度监控</span>
				<div class="h-px flex-1 bg-white/[0.04]"></div>
			</div>
			<div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
				<div class="pro-panel rounded-lg p-5">
					<div class="flex items-center justify-between mb-3">

							<span class="text-[9px] font-mono text-white/40 bg-white/[0.04] px-1.5 py-0.5 rounded">CH1</span>
							<span class="text-[11px] text-white/50" id="progress-status-1">等待</span>

						<div class="flex items-center gap-2">

							<span class="text-[11px] text-white/50" id="progress-status-2">等待</span>
						</div>
						<span class="text-[11px] font-mono text-white/60" id="progress-percent-2">0%</span>
					</div>
					<div class="progress-track h-1.5 mb-2">
						<div id="progress-bar-2" class="progress-fill h-full" style="width: 0%"></div>

					<div class="flex justify-between text-[9px] font-mono text-white/25">
						<span id="progress-detail-2">0 / 0</span>

	<script>
		const state = {
		    v1: null, v2: null,
		    outputDir: null,
		    running: false
		};
		
		setInterval(() => {
		    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
		}, 1000);

        function renderLogs(logs) {
            const logEl = document.getElementById('system-log');
            logEl.innerHTML = '';
            logs.forEach(msg => {
                const line = document.createElement('div');
                line.textContent = msg;
                if(msg.includes('错误') || msg.includes('异常') || msg.includes('🚫')) line.className = 'text-[#8c5a5a]';
                else if(msg.includes('✅') || msg.includes('完成')) line.className = 'text-[#5a8c6f]';
                else line.className = 'text-white/30';
                logEl.appendChild(line);
            });
            logEl.scrollTop = logEl.scrollHeight;
        }

		async function selectVideo(id) {
            const btn = document.getElementById(`btn-sel-${id}`);
            btn.disabled = true;
            btn.textContent = "加载中...";
            
            try {
                const res = await fetch('/api/select_video', { method: 'POST' });
                const data = await (res.json());
                
                if (data.error) {
                    if (data.error !== "canceled") alert(data.error);
                } else {
                    state[`v${id}`] = data;
                    document.getElementById(`filename-${id}`).textContent = data.name;
                    document.getElementById(`filename-${id}`).classList.replace('text-white/30', 'text-white/70');
                    document.getElementById(`status-${id}`).classList.replace('idle', 'active');
                    
                    const img = document.getElementById(`img-${id}`);
                    img.src = 'data:image/jpeg;base64,' + data.first_frame;
                    img.classList.remove('hidden');
                    document.getElementById(`placeholder-${id}`).classList.add('hidden');
                    
                    document.getElementById('zoom-hint').classList.remove('hidden');
                    
                    initImageZoomPan(`container-${id}`, `img-${id}`, data.width, data.height);
                    updateEstimateAndResolution();
                }
            } catch(e) {
                console.error(e);
            }
            btn.disabled = false;
            btn.innerHTML = "选择";
            checkState();
		}

        function initImageZoomPan(containerId, imgId, nativeW, nativeH) {
            const container = document.getElementById(containerId);
            const img = document.getElementById(imgId);
            
            let scale = 1, tx = 0, ty = 0;
            let isDragging = false, startX, startY;

            // Fit image into container bounds initially
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const fitScale = Math.min(cw/nativeW, ch/nativeH);
            const displayW = nativeW * fitScale;
            const displayH = nativeH * fitScale;
            
            // Center it
            tx = (cw - displayW) / 2;
            ty = (ch - displayH) / 2;
            
            img.style.width = displayW + 'px';
            img.style.height = displayH + 'px';
            img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;

            container.onwheel = e => {
                e.preventDefault();
                const xs = (e.clientX - container.getBoundingClientRect().left - tx) / scale;
                const ys = (e.clientY - container.getBoundingClientRect().top - ty) / scale;
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                let newScale = scale * delta;
                newScale = Math.max(1, Math.min(newScale, 20));
                
                tx = tx + xs * scale - xs * newScale;
                ty = ty + ys * scale - ys * newScale;
                scale = newScale;

                // Restrict boundaries
                if(scale === 1) {
                    tx = (cw - displayW) / 2;
                    ty = (ch - displayH) / 2;
                }
                img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            };

            container.onmousedown = e => {
                if(scale > 1) {
                    isDragging = true;
                    startX = e.clientX - tx;
                    startY = e.clientY - ty;
                    container.classList.add('grabbing');
                }
            };
            window.addEventListener('mousemove', e => {
                if(!isDragging) return;
                tx = e.clientX - startX;
                ty = e.clientY - startY;
                img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
                container.classList.remove('grabbing');
            });
        }
		
		async function selectOutput() {
            const res = await fetch('/api/select_dir', { method: 'POST' });
            const data = await res.json();
            if(!data.error) {
                state.outputDir = data.path;
                const el = document.getElementById('output-path');
                el.textContent = data.path;
                el.classList.replace('text-white/25', 'text-white/70');
                document.getElementById('btn-out').classList.add('border-[#5a7a96]');
            }
            checkState();
		}
		
		function validateTime(input, max) {
		    let val = parseInt(input.value);
		    if (isNaN(val) || val < 0) val = 0;
		    if (val > max) val = max;
		    input.value = val.toString().padStart(2, '0');
		    checkSyncBadge();
		}

        function getSec(prefix) {
            return parseInt(document.getElementById(`h${prefix}`).value)*3600 +
                   parseInt(document.getElementById(`m${prefix}`).value)*60 +
                   parseInt(document.getElementById(`s${prefix}`).value);
        }
		
		function checkSyncBadge() {
		    const badge = document.getElementById('sync-badge');
		    if (state.v1 && state.v2) {
		        const diff = getSec(2) - getSec(1);
		        badge.style.opacity = '1';
		        const sign = diff >= 0 ? '+' : '';
		        badge.innerHTML = `偏移 <span class="text-white/60">${sign}${diff.toFixed(2)}s</span>`;
		    } else {
		        badge.style.opacity = '0';
		    }
		}

        function updateEstimateAndResolution() {
            let totalFrames = 0;
            let minW = Infinity;
            if(state.v1) { totalFrames += state.v1.total_frames; minW = Math.min(minW, state.v1.width); }
            if(state.v2) { totalFrames += state.v2.total_frames; minW = Math.min(minW, state.v2.width); }
            
            if(totalFrames > 0) {
                document.getElementById('estimate-frames').textContent = totalFrames.toLocaleString();
                document.getElementById('estimate-size').textContent = `~${((totalFrames/25)*2/1024).toFixed(2)} GB`;
            }

            const sel = document.getElementById('resolution');
            sel.innerHTML = '<option value="original">原分辨率 (Original)</option>';
            if(minW > 1920) sel.innerHTML += '<option value="1920x1080">FHD (1920×1080)</option>';
            if(minW > 1280) sel.innerHTML += '<option value="1280x720">HD (1280×720)</option>';
            if(minW > 854) sel.innerHTML += '<option value="854x480">SD (854×480)</option>';
        }

        function checkState() {
            const hasBoth = state.v1 && state.v2;
            const btnOut = document.getElementById('btn-out');
            const selRes = document.getElementById('resolution');
            const btnStart = document.getElementById('btn-start');

            btnOut.disabled = !hasBoth;
            selRes.disabled = !hasBoth;
            btnStart.disabled = !(hasBoth && state.outputDir);

            if(hasBoth) {
                btnOut.classList.replace('btn-ghost', 'btn-accent');
            }
            if(hasBoth && state.outputDir) {
                btnStart.classList.replace('btn-action', 'btn-accent');
                btnStart.style.backgroundColor = '#5a8c6f20';
                btnStart.style.borderColor = '#5a8c6f50';
                btnStart.style.color = '#8cbaa0';
            }
            checkSyncBadge();
        }
		
		async function startMission() {
            const resVal = document.getElementById('resolution').value;
            let res_limit = null;
            if(resVal !== 'original') {
                const parts = resVal.split('x');
                res_limit = [parseInt(parts[0]), parseInt(parts[1])];
            }

            const payload = {
                v1: state.v1.path,
                v2: state.v2.path,
                out: state.outputDir,
                t1_sec: getSec(1),
                t2_sec: getSec(2),
                res_limit: res_limit
            };

            await fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            startPolling();
		}

        async function stopMission() {
            await fetch('/api/stop', { method: 'POST' });
        }

        let pollTimer = null;
        function startPolling() {
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;
            document.getElementById('btn-out').disabled = true;
            document.getElementById('resolution').disabled = true;

            if(pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(async () => {
                const res = await fetch('/api/status');
                const data = await res.json();

                renderLogs(data.logs);

                [1, 2].forEach(id => {
                    const p = data[`progress${id}`];
                    document.getElementById(`progress-bar-${id}`).style.width = `${p.percent}%`;
                    document.getElementById(`progress-percent-${id}`).textContent = `${p.percent}%`;
                    document.getElementById(`progress-status-${id}`).textContent = p.status;
                    document.getElementById(`progress-detail-${id}`).textContent = `${p.current} / ${p.total}`;
                    document.getElementById(`time-remain-${id}`).textContent = p.eta;
                });

                if(!data.is_processing) {
                    clearInterval(pollTimer);
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-stop').disabled = true;
                    document.getElementById('btn-out').disabled = false;
                    document.getElementById('resolution').disabled = false;
                }
            }, 500);
        }
	</script>
</body>
